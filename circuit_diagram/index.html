<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>回路図エディタ</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>回路図エディタ</h1>
            <p>部品を並べて、配線して、PDFや画像に出力</p>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="text-button" id="undoBtn" type="button" title="1つ前の状態に戻す">1つ戻す</button>
          <button class="text-button" id="redoBtn" type="button" title="戻した操作をやり直す">やり直す</button>
          <span class="divider" aria-hidden="true"></span>
          <button class="text-button danger" id="clearBtn" type="button">クリア</button>
          <button class="text-button" id="pngBtn" type="button">PNG</button>
          <button class="primary-button" id="pdfBtn" type="button">PDF</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="panel palette-panel" aria-label="部品パレット">
          <div class="panel-section">
            <h2>部品</h2>
            <div class="palette-grid" id="palette"></div>
          </div>
          <div class="panel-section">
            <h2>モード</h2>
            <div class="segmented" role="group" aria-label="編集モード">
              <button class="segment active" id="selectModeBtn" type="button">選択</button>
              <button class="segment" id="wireModeBtn" type="button">配線</button>
            </div>
          </div>
          <div class="panel-section hint-list">
            <h2>操作</h2>
            <p>部品はクリックで追加、広めの範囲をドラッグして移動できます。</p>
            <p>表示中の部品名や値は、文字そのものをドラッグして位置を動かせます。</p>
            <p>Commandを押しながらクリック、または空白からドラッグして複数選択できます。</p>
            <p>配線は端子、導線、空白をクリックして、上下左右の直線として引けます。</p>
            <p><kbd>R</kbd> 回転 / <kbd>Delete</kbd> 削除 / <kbd>Esc</kbd> 解除</p>
          </div>
        </aside>

        <section class="canvas-wrap" aria-label="回路図キャンバス">
          <div class="canvas-toolbar">
            <div class="status-pill" id="modeStatus">選択モード</div>
            <label class="toggle-row">
              <input id="gridToggle" type="checkbox" checked />
              <span>グリッド</span>
            </label>
            <label class="toggle-row">
              <input id="snapToggle" type="checkbox" checked />
              <span>スナップ</span>
            </label>
            <label class="toggle-row">
              <input id="hideNameToggle" type="checkbox" checked />
              <span>回路中に名前を非表示</span>
            </label>
            <label class="toggle-row">
              <input id="hideValueToggle" type="checkbox" checked />
              <span>回路中に値を非表示</span>
            </label>
          </div>
          <svg id="schematic" viewBox="0 0 1280 760" role="img" aria-label="作成中の回路図">
            <defs>
              <pattern id="smallGrid" width="16" height="16" patternUnits="userSpaceOnUse">
                <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#e2e8f0" stroke-width="1" />
              </pattern>
              <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
                <rect width="80" height="80" fill="url(#smallGrid)" />
                <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#cbd5e1" stroke-width="1.2" />
              </pattern>
            </defs>
            <rect class="grid-bg" width="1280" height="760" fill="url(#grid)" />
            <g id="wireLayer"></g>
            <g id="componentLayer"></g>
            <g id="overlayLayer"></g>
          </svg>
        </section>

        <aside class="panel inspector-panel" aria-label="選択中の設定">
          <div class="panel-section">
            <h2>選択</h2>
            <div id="emptyInspector" class="empty-state">
              部品または配線を選ぶと、名前や値を編集できます。
            </div>
            <div id="componentInspector" class="inspector hidden">
              <label>
                <span>名前</span>
                <input id="labelInput" type="text" autocomplete="off" />
              </label>
              <label>
                <span>値</span>
                <input id="valueInput" type="text" autocomplete="off" />
              </label>
              <div class="button-row">
                <button class="text-button" id="rotateBtn" type="button">回転</button>
                <button class="text-button" id="duplicateBtn" type="button">複製</button>
                <button class="text-button danger" id="deleteBtn" type="button">削除</button>
              </div>
            </div>
            <div id="multiInspector" class="inspector hidden">
              <p class="wire-meta" id="multiMeta"></p>
              <div class="button-row">
                <button class="text-button" id="rotateMultiBtn" type="button">回転</button>
                <button class="text-button" id="duplicateMultiBtn" type="button">複製</button>
                <button class="text-button danger" id="deleteMultiBtn" type="button">削除</button>
              </div>
            </div>
            <div id="wireInspector" class="inspector hidden">
              <p class="wire-meta" id="wireMeta"></p>
              <button class="text-button danger full" id="deleteWireBtn" type="button">配線を削除</button>
            </div>
          </div>
          <div class="panel-section">
            <h2>図面</h2>
            <label>
              <span>タイトル</span>
              <input id="titleInput" type="text" value="Untitled Circuit" autocomplete="off" />
            </label>
            <label>
              <span>メモ</span>
              <textarea id="noteInput" rows="4" placeholder="例: 5V LED 点灯回路"></textarea>
            </label>
          </div>
        </aside>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js?v=20260509-2"></script>
  </body>
</html>
